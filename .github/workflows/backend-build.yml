name: Backend build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build Aula Clara API
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: aula-clara-api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Show .NET info
        run: dotnet --info

      - name: Restore dependencies
        run: dotnet restore AulaClara.slnx

      - name: Build solution
        run: dotnet build AulaClara.slnx --configuration Release --no-restore
